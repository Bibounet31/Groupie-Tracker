<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Artists</title>
    <link rel="stylesheet" href="../css/albums.css">
</head>

<body>

<a href="/">Back to menu</a>
<h1>Artists</h1>

<!-- SEARCH BAR -->
<div class="input-container">
    <div class="autocomplete">
        <select id="searchType">
            <option value="artist">Artist</option>
            <option value="member">Member</option>
        </select>
        <input type="text" id="myInput" placeholder="Search..." />
        <ul id="suggestions"></ul>
    </div>
</div>

<div class="filters-container">
    <form id="filtersForm" method="get" action="/artists">
        <div class="filters-top">
            <label>
                Year min:
                <input type="number" name="year_min" placeholder="e.g., 1990">
            </label>
            <label>
                Year max:
                <input type="number" name="year_max" placeholder="e.g., 2020">
            </label>
            <label>
                Number of members:
                <input type="text" name="members_count" placeholder="e.g., 3 or 5+">
            </label>
            <button type="submit">Apply Filters</button>
            <button type="button" class="clear-btn" onclick="clearFilters()">Clear Filters</button>
        </div>
    </form>
</div>

<button id="theme-toggle" aria-label="Changer le thème">
    🌙
</button>

<script>
    const toggleBtn = document.getElementById("theme-toggle");
    const root = document.documentElement;

    // Charger le thème sauvegardé
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
        root.setAttribute("data-theme", savedTheme);
        toggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    toggleBtn.addEventListener("click", () => {
        const isDark = root.getAttribute("data-theme") === "dark";

        if (isDark) {
            root.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            toggleBtn.textContent = "🌙";
        } else {
            root.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            toggleBtn.textContent = "☀️";
        }
    });
</script>

<script>
    if (!localStorage.getItem("theme")) {
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    }
</script>

<!-- ARTISTS LIST -->
<ul id="myUL">
    {{ range . }}
    <li>
        <img src="{{ .Image }}" alt="" class="artist-img">
        <a href="/details/{{ .Name | pathEscape }}">{{ .Name }}</a>
    </li>
    {{ end }}
</ul>

<a href="/overallmap">see all concerts</a>


<div class="custom-checkbox">
    <input id="status"
           type="checkbox"
           name="status">
    <label for="status">
        <div class="status-switch"
             data-unchecked="Off"
             data-checked="On">
        </div>
    </label>
</div>


<!-- SCRIPTS -->
<script src="../js/script.js"></script>
<script src="../js/transitions.js"></script>
</body>
</html>
